<!DOCTYPE html>
<html>
<head>
<title>Watch Party</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div class="logo">
<div class="circle"></div>
<h1>Watch Party</h1>
<p>Watch together anywhere.</p>
</div>

<div class="nameBox">
<input id="username" placeholder="Enter your name">
</div>

<div class="actions">

<button id="create" class="card">
<span>＋</span>
<h2>Create Room</h2>
<p>Create a new watch session</p>
</button>

<button id="join" class="card">
<span>↗</span>
<h2>Join Room</h2>
<p>Join using room code</p>
</button>

<div class="enter">
<input id="roomCode" placeholder="6 digit room code">
<button>Enter</button>
</div>

</div>

<div id="result"></div>

</div>

<script src="js/renderer.js"></script>
</body>
</html>
