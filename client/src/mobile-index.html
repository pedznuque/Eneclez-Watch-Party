<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0d12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eneclez Watch">
    <title>Eneclez Watch Party</title>
    <link rel="manifest" href="/mobile/manifest.webmanifest">
    <link rel="stylesheet" href="/mobile/css/mobile.css">
</head>
<body class="mobile-lobby">
    <main class="mobile-shell">
        <section class="mobile-hero">
            <div class="mobile-brand">
                <span class="mobile-mark">EW</span>
                <div>
                    <p>Mobile watch party</p>
                    <h1>Eneclez Watch Party</h1>
                </div>
            </div>
            <p class="mobile-copy">Join rooms, chat, queue videos, and watch from iPhone or Android.</p>
        </section>

        <section class="mobile-card" aria-label="Start or join room">
            <label for="username">Display name</label>
            <input id="username" maxlength="24" autocomplete="name" placeholder="Your name">

            <button id="createRoom" class="primary-action">Create room</button>

            <div class="mobile-divider"><span>or join with a code</span></div>

            <label for="roomCode">Room code</label>
            <div class="mobile-join-row">
                <input id="roomCode" inputmode="numeric" maxlength="6" placeholder="123456">
                <button id="joinRoom" class="secondary-action">Join</button>
            </div>

            <p id="status" class="mobile-status" role="status"></p>

            <section id="recentRoomsSection" class="mobile-recents" hidden>
                <div class="mobile-section-row">
                    <h2>Recent rooms</h2>
                    <button id="clearRecentRooms" class="text-action" type="button">Clear</button>
                </div>
                <div id="recentRooms" class="mobile-recent-list"></div>
            </section>
        </section>
    </main>

    <script src="/mobile/js/mobile-app.js"></script>
</body>
</html>
