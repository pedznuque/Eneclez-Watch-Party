<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0d12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eneclez Watch">
    <title>Eneclez Watch Party Room</title>
    <link rel="manifest" href="/mobile/manifest.webmanifest">
    <link rel="stylesheet" href="/mobile/css/mobile.css">
</head>
<body class="mobile-room">
    <div id="roomLoading" class="mobile-loading">
        <span></span>
        <strong>Opening room</strong>
        <small>Connecting to Eneclez Watch Party</small>
    </div>

    <main class="mobile-room-shell">
        <header class="mobile-room-top">
            <div>
                <p>Room <span id="roomCodeLabel">------</span></p>
                <h1>Eneclez Watch Party</h1>
            </div>
            <a class="ghost-action" href="/mobile">Leave</a>
        </header>

        <section class="mobile-player-card">
            <div id="playerEmpty" class="mobile-player-empty">
                <strong>No video loaded</strong>
                <small>Paste a link or wait for the host.</small>
            </div>
            <iframe id="playerFrame" title="Watch player" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen hidden></iframe>
        </section>

        <section class="mobile-controls">
            <button id="playPause" class="round-action" type="button" disabled aria-label="Play">&gt;</button>
            <div class="mobile-progress-wrap">
                <div class="mobile-time">
                    <span id="timeText">00:00 / 00:00</span>
                    <span id="hostText">Waiting</span>
                </div>
                <input id="progress" type="range" min="0" max="1000" value="0" step="1" disabled aria-label="Video progress">
            </div>
        </section>

        <section class="mobile-media-tools">
            <input id="mediaUrl" inputmode="url" placeholder="Paste YouTube, Dailymotion, or Facebook link">
            <div class="mobile-tool-row">
                <button id="playNow" class="primary-action" type="button">Play</button>
                <button id="addQueue" class="secondary-action" type="button">Queue</button>
            </div>
            <p id="mediaStatus" class="mobile-status"></p>
        </section>

        <section class="mobile-chat-card">
            <div class="mobile-section-row">
                <h2>Chat</h2>
                <button id="peopleToggle" class="pill-action" type="button">People <span id="guestCount">0</span></button>
            </div>
            <div id="peoplePanel" class="mobile-people" hidden></div>
            <div id="messages" class="mobile-messages"></div>
            <p id="typing" class="mobile-typing"></p>
            <form id="chatForm" class="mobile-chat-form">
                <input id="message" maxlength="500" placeholder="Message everyone" autocomplete="off">
                <button class="primary-action" type="submit">Send</button>
            </form>
        </section>

        <section class="mobile-queue-card">
            <div class="mobile-section-row">
                <h2>Queue</h2>
                <span id="queueCount" class="mobile-count">0</span>
            </div>
            <div id="queueList" class="mobile-queue-list"></div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/mobile/js/mobile-room.js"></script>
</body>
</html>
