name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach installer to, for example v1.0.1"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "client/**"
      - ".github/workflows/build-windows-installer.yml"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eneclez-Watch-Party-Windows-Installer
          path: |
            client/dist/*.exe
            client/dist/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Attach installer to GitHub Release
        if: github.event_name == 'release' || inputs.release_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          $installer = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No installer .exe found in client/dist"
          }
          gh release upload "$env:RELEASE_TAG" "$($installer.FullName)" --clobber
